<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cameo Faction Roster</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Cameo Faction Roster</h1>
  <div class="controls">
    <label>Theme <select id="theme"></select></label>
    <label>Faction <select id="faction"></select></label>
    <label class="search">Find <input id="search" type="text" placeholder="unit / prereq…" autocomplete="off"></label>
    <label class="check"><input type="checkbox" id="showUpg"> show upgrades/research</label>
    <span id="approx" class="approx hidden">⚠ approximate faction split</span>
    <span id="meta" class="meta"></span>
    <a class="alt" href="../cameo-techtree/">graph view →</a>
  </div>
</header>
<main id="grid"></main>
<div id="tip" class="tip hidden"></div>
<footer>Cameos rendered from the mod sprites. Hover a unit for stats. <span id="gen"></span></footer>
<script src="app.js"></script>
</body>
</html>
