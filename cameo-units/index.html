<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cameo Faction Roster</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Cameo Faction Roster</h1>
  <div class="controls">
    <label>Theme <select id="theme"></select></label>
    <label>Faction <select id="faction"></select></label>
    <label class="search">Find
      <span class="search-wrap">
        <input id="search" type="text" placeholder="unit / prereq…" autocomplete="off">
        <button id="searchClear" class="clear-btn hidden" type="button" aria-label="clear search">×</button>
      </span>
    </label>
    <label class="check"><input type="checkbox" id="showUpg" checked> show upgrades/research</label>
    <label class="check"><input type="checkbox" id="showLinks" checked> highlight prereqs/unlocks on hover</label>
    <span id="approx" class="approx hidden">⚠ approximate faction split</span>
    <span id="meta" class="meta"></span>
    <a class="alt" href="../cameo-techtree/">graph view →</a>
  </div>
</header>
<main id="grid"></main>
<div id="offTop" class="off-indicator top hidden"></div>
<div id="offBottom" class="off-indicator bottom hidden"></div>
<div id="tip" class="tip hidden"></div>
<div id="overlay" class="overlay hidden">
  <div id="detail" class="detail" role="dialog" aria-modal="true">
    <button id="detailClose" aria-label="close">×</button>
    <div id="detailBody"></div>
  </div>
</div>
<footer>Cameos rendered from the mod sprites. Hover for stats; click a unit for weapons &amp; prerequisites. <span id="gen"></span></footer>
<script src="app.js"></script>
</body>
</html>
